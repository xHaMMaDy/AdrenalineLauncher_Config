; antihack.ini -- launcher anti-cheat configuration.
;
; Upload this file to the GitHub config repo as antihack.ini.
; This keeps pre-launch block in observe mode, enables hash blocklist,
; enables the new DLL/module inventory, and keeps remote admin enabled.

[AntiHack]
Enabled=1

; Kill the game when a violation fires. Set to 0 to report-only.
KillOnViolation=1

; Soft evidence needs this many strikes inside the window before kill.
MinSoftViolations=2
SoftWindowSec=30

; Seconds after game start during which soft checks are suppressed.
GraceSec=10

; Seconds between in-game rescans.
RescanIntervalSec=15

; Discord webhook for reports.
WebhookUrl=https://discord.com/api/webhooks/1495745475070922876/F64Wesh3D1XTHEzNiolc9amqlvqkWQ3MSBUDr60if35US2rAF-4o1ReHAcNAC1xqJNan

; Label shown on webhook reports.
ServerName=Adrenaline

; Attach screenshot to kill-level violation reports.
ScreenshotOnViolation=1

[Toggles]
blacklist_scan=1
debugger_attach=0
periodic_rescan=1
dbk_driver_check=1
ce_window_killswitch=1

; 0 = observe/report pre-launch hits but still allow launch.
; 1 = block launch on pre-launch hits.
prelaunch_block=0

; Hash known cheat EXEs against the Worker blocklist.
hash_blacklist=1

; New DLL/module inventory:
; reports user-writable, unsigned, or post-baseline modules loaded into game.
anti_dll_injection=1

; Keep off unless you intentionally want executable page protection.
memory_protection=0

[Whitelist]
ExtraProcesses=
ExtraDllPaths=

[Remote]
BeatUrl=https://adrenaline-admin.ibrahimhammad364.workers.dev
ClientKey=lSOXdK5laR4LXSlQf5mJ_OPOUhMdJ9H3UXhgO2vE_QQ
BeatIntervalSec=30

[Blocklist]
Url=https://adrenaline-admin.ibrahimhammad364.workers.dev/blocklist
RefreshSec=600
