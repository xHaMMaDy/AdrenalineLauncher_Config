; antihack.ini -- launcher anti-cheat configuration.
;
; All tricks can be toggled on/off here. Default tuning is conservative
; to minimise false positives. If legitimate users get flagged, flip the
; offending toggle to 0 and/or add their process/DLL path to the Whitelist
; section.

[AntiHack]
Enabled=1

; Kill the game when a violation fires. Set to 0 to report-only (useful
; while rolling out the system to see how noisy it is).
KillOnViolation=1

; A "soft" violation (process name, foreign DLL) needs MinSoftViolations
; strikes within SoftWindowSec seconds before the game is killed. Default
; = 2 strikes / 30s window.
MinSoftViolations=2
SoftWindowSec=30

; Seconds after game start during which soft checks are suppressed. Covers
; CE still being in memory from a previous session.
GraceSec=10

; Seconds between in-game rescans.
RescanIntervalSec=15

; Discord webhook. Empty disables reporting. Get one from your server
; settings -> Integrations -> Webhooks -> New Webhook -> Copy URL.
WebhookUrl=https://discord.com/api/webhooks/1495745475070922876/F64Wesh3D1XTHEzNiolc9amqlvqkWQ3MSBUDr60if35US2rAF-4o1ReHAcNAC1xqJNan

; Label put in the webhook username column ("<ServerName> AC").
ServerName=Adrenaline

; Attach a PNG of the screen to violation reports (kill-level only,
; never on warn-only reports).
ScreenshotOnViolation=1

[Toggles]
; Individual anti-cheat mechanisms. 1 = on, 0 = off.
blacklist_scan=1
debugger_attach=0
periodic_rescan=1
dbk_driver_check=1
ce_window_killswitch=1
prelaunch_block=0

; These two default to OFF because they can false-positive on legitimate
; setups (e.g. game overlays, custom graphics drivers). Enable only if
; you know what you are doing.
anti_dll_injection=0
memory_protection=0

[Whitelist]
; Comma-separated additions on top of the built-in list. Process names
; are matched case-insensitively. DLL path entries are prefix matches
; against the full path (also case-insensitive).
ExtraProcesses=
ExtraDllPaths=
